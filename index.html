<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>💖 For Asmaa</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: radial-gradient(circle at top, #ff0066, #0b0014);
    overflow:hidden;
    color:white;
    text-align:center;
}

/* Intro */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    z-index:10;
    animation: fadeOut 2s 2s forwards;
}

@keyframes fadeOut{
    to{opacity:0; visibility:hidden;}
}

/* Main */
#main{
    opacity:0;
    animation: show 2s 3s forwards;
}

@keyframes show{
    to{opacity:1;}
}

/* Title */
h1{
    font-size:60px;
    margin-top:60px;
    text-shadow:0 0 25px #ff0066;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{transform:scale(1);}
    to{transform:scale(1.1);}
}

p{
    font-size:20px;
}

/* Buttons */
button{
    padding:15px 30px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin:5px;
}

#yes{
    background:white;
    color:#ff0066;
    font-weight:bold;
}

#no{
    background:#222;
    color:white;
    position:absolute;
}

/* Final */
#final{
    display:none;
    font-size:32px;
    margin-top:30px;
    animation: pop 1s ease;
}

@keyframes pop{
    from{transform:scale(0);}
    to{transform:scale(1);}
}

/* Hearts */
.heart{
    position:absolute;
    color:red;
    font-size:20px;
    animation: float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);opacity:0;}
}

/* Confetti */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    background:yellow;
    animation: fall 3s linear forwards;
}

@keyframes fall{
    to{transform:translateY(100vh) rotate(720deg);opacity:0;}
}
</style>

</head>

<body>

<div id="intro">💖 Preparing something unforgettable for Asmaa...</div>

<div id="main">

<h1 id="title"></h1>

<p>
يا Asmaa ❤️<br>
أنا مش جاي أبرر… أنا جاي أقولك الحقيقة 💔<br>
إنتي أهم حاجة حصلت في حياتي
</p>

<button onclick="startGame()">ابدأ 💌</button>
<button onclick="playHeart()">🔊 تشغيل القلب</button>

<div id="question" style="display:none;margin-top:30px;">
    <h2>Asmaa… تسامحيني؟ 🥺</h2>

    <button id="yes" onclick="yes()">أيوه ❤️</button>
    <button id="no" onmouseover="runAway()">لأ 😏</button>
</div>

<div id="final">
💖 Asmaa 💖<br><br>
أنا مش عايز أغير حاجة في الماضي… بس عايز أكون مستقبلك ❤️<br>
لو قلبك سامحني… أنا مش هضيعه تاني 💞
</div>

</div>

<!-- صوت قلب -->
<audio id="heartSound" src="heartbeat.mp3"></audio>

<script>

/* كتابة اسم سينمائي */
let text="For Asmaa 💖";
let i=0;

function type(){
    if(i<text.length){
        document.getElementById("title").innerHTML+=text[i];
        i++;
        setTimeout(type,120);
    }
}
setTimeout(type,3000);

/* بداية اللعبة */
function startGame(){
    document.getElementById("question").style.display="block";
    hearts();
}

/* زر يهرب */
function runAway(){
    let b=document.getElementById("no");
    b.style.top=Math.random()*80+"vh";
    b.style.left=Math.random()*80+"vw";
}

/* موافقة */
function yes(){
    document.getElementById("final").style.display="block";
    confetti();
}

/* قلوب قوية */
function hearts(){
    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="❤️";
        h.style.left=Math.random()*100+"vw";
        h.style.fontSize=(Math.random()*20+10)+"px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6000);
    },100);
}

/* كونفيتي */
function confetti(){
    for(let i=0;i<150;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}

/* صوت القلب */
function playHeart(){
    document.getElementById("heartSound").play();
}

</script>

</body>
</html>
